name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-gates:
    name: Deterministic gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate fixtures
        run: pnpm validate:fixtures

      - name: Eval suite CI gates
        run: pnpm eval:ci

      - name: Score baseline trace
        run: pnpm eval:baseline

      - name: Score guarded recovery trace
        run: pnpm eval

      - name: Policy comparison
        run: pnpm compare

      - name: Python tests
        run: python -m pytest

      - name: Typecheck
        run: pnpm typecheck

      - name: Build hosted demo
        run: pnpm build
